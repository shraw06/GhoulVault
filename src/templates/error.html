<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% if status == 404 %}
    <title>404 Page Not Found</title>
    {% else %}
    <title>An Error Occured ({{ status }})</title>
    {% endif %}
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      body {
        display: grid;
        place-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background-color: var(--bg-col-lighter);
        padding: 2.5rem;
        border-radius: 0.75rem;
        text-align: center;
        max-width: 500px;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 1.5rem;
        font-weight: 600;
        text-align: center;
      }
      p {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        line-height: 2rem;
        text-align: center;
      }
      .container div {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      button,
      .button {
        font-size: 1rem;
        width: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      {% if status == 404 %}
      <h1>404 Page Not Found</h1>
      <p>The page you were looking for was not found.</p>
      <div>
        <button class="secondary" onclick="history.back()">Back</button>
        <a href="/" class="button">Home</a>
      </div>
      {% else %}
      <h1>An Error Occured {{ status }}</h1>
      <p>{{ detail }}</p>
      <div>
        <button class="secondary" onclick="history.back()">Back</button>
        <a href="/" class="button">Home</a>
      </div>
      {% endif %}
    </div>
  </body>
</html>
